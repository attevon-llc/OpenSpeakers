# OpenSpeakers model registry
# Edit this file to add, disable, or override models.
# Changes take effect on worker restart (models are loaded lazily).

models:
  vibevoice:
    enabled: true
    class: app.models.vibevoice.VibeVoiceModel
    hf_repo: microsoft/VibeVoice-Realtime-0.5B
    vram_gb: 4.5
    priority: 1  # lower = preferred default model
    description: Microsoft VibeVoice real-time streaming TTS with 12 built-in voices

  vibevoice-1.5b:
    enabled: true
    class: app.models.vibevoice_1p5b.VibeVoice1p5BModel
    hf_repo: microsoft/VibeVoice-1.5B
    vram_gb: 12.0
    priority: 1
    description: Microsoft VibeVoice 1.5B — zero-shot voice cloning, multi-speaker, long-form TTS

  fish-speech-s2:
    enabled: true
    class: app.models.fish_speech.FishSpeechModel
    hf_repo: fishaudio/s2-pro
    vram_gb: 8.0
    priority: 2
    description: Fish Audio S2-Pro — zero-shot voice cloning, emotion tags, 80+ languages
    license: FISH_AUDIO_RESEARCH  # See https://github.com/fishaudio/fish-speech/blob/main/LICENSE

  kokoro:
    enabled: true
    class: app.models.kokoro.KokoroModel
    hf_repo: hexgrad/Kokoro-82M
    vram_gb: 0.5
    priority: 3
    standby: true  # keep loaded between requests (< 0.5 GB VRAM)
    description: Kokoro 82M — fast, lightweight, 50+ preset voices

  qwen3-tts:
    enabled: true  # Runs on dedicated worker-qwen3 container with transformers 5.x
    class: app.models.qwen3_tts.Qwen3TTSModel
    hf_repo: Qwen/Qwen3-TTS
    vram_gb: 10.0
    priority: 4
    description: Qwen3 TTS — large multilingual model

  f5-tts:
    enabled: true
    class: app.models.f5_tts.F5TTSModel
    hf_repo: SWivid/F5-TTS
    vram_gb: 3.0
    priority: 5
    description: F5-TTS — flow matching, zero-shot cloning, 15x realtime speed, MIT license

  chatterbox:
    enabled: true
    class: app.models.chatterbox.ChatterboxModel
    hf_repo: ResembleAI/chatterbox
    vram_gb: 5.0
    priority: 5
    description: Resemble AI Chatterbox — emotion exaggeration control, zero-shot cloning, MIT license

  orpheus-3b:
    enabled: true  # Runs on dedicated worker-orpheus container
    class: app.models.orpheus.OrpheusTTSModel
    hf_repo: canopylabs/orpheus-3b-0.1-ft
    vram_gb: 7.0
    priority: 5
    description: Canopy Labs Orpheus 3B — Llama-based, emotion/intonation tags, ~200ms latency

  cosyvoice-2:
    enabled: true
    class: app.models.cosyvoice.CosyVoice2Model
    hf_repo: FunAudioLLM/CosyVoice2-0.5B
    vram_gb: 5.0
    priority: 5
    description: FunAudioLLM CosyVoice 2.0 — 150ms latency, zero-shot cloning, voice design via text

  parler-tts:
    enabled: true
    class: app.models.parler_tts.ParlerTTSModel
    hf_repo: parler-tts/parler-tts-mini-v1
    vram_gb: 3.0
    priority: 5
    description: Parler TTS Mini — describe any voice in natural language, no reference audio needed

  dia-1b:
    enabled: true  # Runs on dedicated worker-dia container
    class: app.models.dia_tts.DiaTTSModel
    hf_repo: nari-labs/Dia-1.6B-0626
    vram_gb: 10.0
    priority: 5
    description: Nari Labs Dia 1.6B — dialogue generation with [S1]/[S2] speaker tags and nonverbal sounds
