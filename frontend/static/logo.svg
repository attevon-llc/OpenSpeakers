<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <radialGradient id="bg" cx="45%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#0c2a42"/>
      <stop offset="100%" stop-color="#060e1a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <circle cx="50" cy="50" r="50" fill="url(#glow)"/>

  <!-- Speaker body (rect + cone) -->
  <rect x="16" y="37" width="15" height="26" rx="2.5" fill="white" opacity="0.92"/>
  <path d="M31 33 L49 20 L49 80 L31 67 Z" fill="white" opacity="0.88"/>

  <!-- Sound waves — sky blue gradient, increasing opacity fade -->
  <path d="M56 40 Q66 50 56 60"
        stroke="url(#waveGrad)" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <path d="M63 33 Q77 50 63 67"
        stroke="url(#waveGrad)" stroke-width="3.8" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M70 26 Q89 50 70 74"
        stroke="url(#waveGrad)" stroke-width="3.2" stroke-linecap="round" fill="none" opacity="0.4"/>

  <!-- Tiny shine dot on speaker -->
  <circle cx="23" cy="43" r="2.5" fill="white" opacity="0.25"/>
</svg>
